<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASIR CloudHub — Panel de control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
    <h1>ASIR CloudHub</h1>
        <p class="subtitle">Panel de despliegue de stacks Docker</p>
        <button id="btn-limpiar" class="btn-limpiar">🧹 Limpiar recursos huérfanos</button>
</header>

    <main>
        <!-- Sección de despliegue -->
        <section class="acciones">
            <h2>Desplegar nuevo stack</h2>

            <div class="form-equipo">
                <label for="equipo-select">Asignar al equipo:</label>
                <select id="equipo-select">
                    <option value="webdev">Webdev (frontend / full-stack)</option>
                    <option value="backend">Backend (APIs y servicios)</option>
                    <option value="marketing">Marketing</option>
                </select>
            </div>

            <div class="grid-botones">
                <button class="btn-stack" data-tipo="lamp">
                    <span class="stack-nombre">LAMP</span>
                    <span class="stack-desc">Apache + PHP + MySQL</span>
                </button>
                <button class="btn-stack" data-tipo="lemp">
                    <span class="stack-nombre">LEMP</span>
                    <span class="stack-desc">Nginx + PHP + MySQL</span>
                </button>
                <button class="btn-stack" data-tipo="wordpress">
                    <span class="stack-nombre">WordPress</span>
                    <span class="stack-desc">Nginx + WP + MariaDB</span>
                </button>
               
            </div>
        </section>

        <!-- Mensaje de feedback -->
        <div id="mensaje"></div>

        <!-- Sección de stacks desplegados -->
        <section class="lista">
            <h2>Stacks desplegados</h2>
            <div id="lista-stacks">
                <p class="vacio">Cargando...</p>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
